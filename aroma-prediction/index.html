<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>单体合成香原料感官评价预测系统展示页</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="appShell" class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">SP</div>
          <div>
            <h1>感官评价预测</h1>
            <p>单体合成香原料感官评价工作台</p>
          </div>
        </div>

        <section class="surface">
          <div class="section-heading">
            <h2>输入</h2>
            <span class="status-pill">静态展示版</span>
          </div>

          <label class="field-label" for="sampleSmiles">SMILES</label>
          <input id="sampleSmiles" class="text-input" type="text" value="C1=CC=C(C=C1)CCO" />

          <label class="field-label" for="sampleName">物质名称</label>
          <input id="sampleName" class="text-input" type="text" value="苯乙醇" />

          <label class="field-label" for="sampleCas">CAS号</label>
          <input id="sampleCas" class="text-input" type="text" value="60-12-8" />

          <button id="singlePredictBtn" class="primary-btn" type="button">单样品预测</button>
        </section>

        <section class="surface">
          <div class="section-heading">
            <h2>批量</h2>
            <span id="fileName" class="muted">示例文件：batch_demo.csv</span>
          </div>
          <input class="file-input" type="file" disabled />
          <button id="templateBtn" class="secondary-btn compact-btn" type="button">下载批量模板</button>
          <button id="batchDemoBtn" class="secondary-btn" type="button">载入批量示例</button>
        </section>

        <section class="surface">
          <div class="section-heading">
            <h2>指标</h2>
            <button id="toggleTargetsBtn" class="link-btn" type="button">清空</button>
          </div>
          <div id="targetList" class="target-list"></div>
        </section>
      </aside>

      <main class="main-area">
        <header class="topbar">
          <div>
            <p class="eyebrow">Heating Tobacco Sensory Prediction</p>
            <h2>预测结果与可靠性分析</h2>
          </div>
          <div class="toolbar">
            <label for="sortSelect">排序</label>
            <select id="sortSelect"></select>
            <button id="exportBtn" class="secondary-btn" type="button">导出 CSV</button>
          </div>
        </header>

        <section id="summaryGrid" class="summary-grid"></section>

        <section class="content-grid">
          <div class="surface results-panel">
            <div class="section-heading">
              <h2>结果表</h2>
              <span id="resultCount" class="muted">暂无结果</span>
            </div>
            <div class="table-wrap">
              <table id="resultTable"></table>
            </div>
          </div>

          <div class="surface analysis-panel">
            <div class="section-heading">
              <h2>数据分析</h2>
              <span id="analysisStatus" class="muted">等待预测</span>
            </div>

            <div class="chart-block">
              <div class="chart-head">
                <div class="chart-title">样品感官图表</div>
                <div class="chart-controls">
                  <select id="sampleSelect" class="compact-select"></select>
                  <button id="chartRadarBtn" class="icon-tab active" type="button">雷达图</button>
                  <button id="chartBarBtn" class="icon-tab" type="button">柱状图</button>
                </div>
              </div>
              <div id="sampleChart" class="sample-chart"></div>
              <div id="chartDetail" class="chart-detail" hidden></div>
            </div>

            <div id="riskChart" class="chart-block"></div>
            <div id="aromaChart" class="chart-block"></div>
            <div id="similarBlock" class="top-list"></div>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" hidden></div>
    <script src="./showcase.js"></script>
  </body>
</html>
